baseURL = "https://paulafonte.fr/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Paula Fonte"
theme = "PaperMod"

[pagination]
  pagerSize = 5

[params]
  disableGoogleAnalytics = true
  env = "production"
  description = "Portfolio freelance en data engineering, analytics et automatisation."
  author = "Paula Fonte"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.brand]
    subtitle = "Data Engineering & Analytics"
    footer = "Portfolio freelance en data engineering, analytics et automatisation."

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/paulafonte"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/PaulaF-source"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:paulafonte97@gmail.com"

[params.profileMode]
  enabled = false

[menu]
  [[menu.main]]
    identifier = "services"
    name = "Services"
    url = "/services/"
    weight = 10
  [[menu.main]]
    identifier = "portfolio"
    name = "Portfolio"
    url = "/portfolio/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "À propos"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 40
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
