baseURL = "https://paulafonte.fr/"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
title = "Paula Fonte"
theme = "PaperMod"

[pagination]
  pagerSize = 5

[params]
  disableGoogleAnalytics = true
  env = "production"
  author = "Paula Fonte"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/paulafonte"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/PaulaF-source"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:paulafonte97@gmail.com"

[params.profileMode]
  enabled = false

[languages]
  [languages.fr]
    languageName = "Français"
    languageCode = "fr-FR"
    weight = 1
    title = "Paula Fonte"
    [languages.fr.params]
      description = "Portfolio personnel en data engineering, analytics et systèmes data lisibles."
      [languages.fr.params.brand]
        subtitle = "Data Engineering · Analytics"
        footer = "Portfolio personnel en data engineering, analytics et systèmes data lisibles."

    [[languages.fr.menu.main]]
      identifier = "about"
      name = "À propos"
      url = "/about/"
      weight = 10
    [[languages.fr.menu.main]]
      identifier = "portfolio"
      name = "Portfolio"
      url = "/portfolio/"
      weight = 20
    [[languages.fr.menu.main]]
      identifier = "blog"
      name = "Blog"
      url = "/blog/"
      weight = 30
    [[languages.fr.menu.main]]
      identifier = "contact"
      name = "Contact"
      url = "/contact/"
      weight = 40

